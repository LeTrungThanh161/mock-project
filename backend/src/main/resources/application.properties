spring.application.name=demo
# Cấu hình kết nối SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DormManagementDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123

# Cấu hình Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
# Secret phải >= 32 ký tự (256 bit) cho HMAC-SHA256
app.jwt.secret=DormManagement_SuperSecretKey_MustBe256BitsAtLeast_2026!
# Token hết hạn sau 24 giờ (tính bằng milliseconds)
app.jwt.expiration-ms=86400000